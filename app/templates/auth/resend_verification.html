{% extends "base.html" %}
{% block title %}Resend Verification – HomeFinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Resend Verification Email</h3>
                <p class="text-muted text-center">Enter the email address you used to register and we'll send a new verification link.</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Verification Link</button>
                </form>
                <hr>
                <p class="text-center mb-0"><a href="{{ site_url('auth.login') }}">Back to Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
