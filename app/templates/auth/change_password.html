{% extends "base.html" %}
{% block title %}Change Password — HomeFinder{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="mb-3"><i class="bi bi-key me-2"></i>Change Password</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">New Password</label>
                        <input type="password" name="new_password" class="form-control" required minlength="8">
                        <div class="form-text">At least 8 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="8">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ site_url('dashboard.index') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Change Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
