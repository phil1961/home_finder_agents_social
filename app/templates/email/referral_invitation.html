<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 0;">
    <div style="background: linear-gradient(135deg, #a18cd1, #fbc2eb); padding: 30px; border-radius: 12px 12px 0 0; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 4px;">&#x1F381;</div>
        <h1 style="color: #1a1a2e; margin: 0; font-size: 22px;">You're Invited to HomeFinder!</h1>
        <p style="color: #4a4a6a; margin: 6px 0 0 0; font-size: 14px;">
            {{ referrer.username }} thinks you'd love it
        </p>
    </div>

    <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none;">
        <p style="color: #475569; font-size: 14px; margin: 0 0 16px 0;">
            HomeFinder is an AI-powered home discovery platform that helps you find great deals,
            share listings with friends, and get expert deal analysis — all for free.
        </p>

        <div style="text-align: center; margin: 24px 0;">
            <a href="{{ referral_url }}"
               style="display: inline-block; background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #1a1a2e; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 16px;">
                Accept Invitation
            </a>
        </div>
    </div>

    <div style="background: #f8fafc; padding: 16px; border-radius: 0 0 12px 12px; border: 1px solid #e5e7eb; border-top: none; text-align: center;">
        <p style="margin: 0; color: #94a3b8; font-size: 12px;">HomeFinder Social</p>
    </div>
</div>
