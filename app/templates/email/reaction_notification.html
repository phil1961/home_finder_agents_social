<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 0;">
    <div style="background: linear-gradient(135deg, #f093fb, #f5576c); padding: 30px; border-radius: 12px 12px 0 0; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 4px;">&#x2764;</div>
        <h1 style="color: #fff; margin: 0; font-size: 22px;">{{ reactor }} reacted!</h1>
        <p style="color: rgba(255,255,255,0.8); margin: 6px 0 0 0; font-size: 14px;">
            They said: <strong>{{ reaction_label }}</strong>
        </p>
    </div>

    <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none;">
        {% if share.listing %}
        <p style="color: #475569; font-size: 14px; margin: 0 0 16px 0;">
            Your shared listing at <strong>{{ share.listing.address }}</strong> got a reaction!
        </p>
        {% endif %}

        <div style="text-align: center;">
            <a href="{{ url_for('social.my_shares', _external=True) }}"
               style="display: inline-block; background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600;">
                View My Shares
            </a>
        </div>
    </div>

    <div style="background: #f8fafc; padding: 16px; border-radius: 0 0 12px 12px; border: 1px solid #e5e7eb; border-top: none; text-align: center;">
        <p style="margin: 0; color: #94a3b8; font-size: 12px;">HomeFinder Social</p>
    </div>
</div>
