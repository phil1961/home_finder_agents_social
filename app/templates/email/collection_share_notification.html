<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 560px; margin: 0 auto; padding: 0;">
    <div style="background: linear-gradient(135deg, #43e97b, #38f9d7); padding: 30px; border-radius: 12px 12px 0 0; text-align: center;">
        <div style="font-size: 32px; margin-bottom: 4px;">&#x1F4DA;</div>
        <h1 style="color: #1a1a2e; margin: 0; font-size: 22px;">{{ sharer }} shared a collection!</h1>
    </div>

    <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none;">
        <h2 style="margin: 0 0 8px 0; font-size: 18px; color: #1e293b;">{{ collection.title }}</h2>
        {% if collection.description %}
        <p style="color: #64748b; font-size: 14px; margin: 0 0 8px 0;">{{ collection.description }}</p>
        {% endif %}
        <p style="color: #94a3b8; font-size: 13px; margin: 0 0 20px 0;">
            {{ collection.listing_count }} listings curated by {{ sharer }}
        </p>

        {% if share.message %}
        <div style="background: #f8fafc; border-radius: 8px; padding: 16px; margin-bottom: 20px; font-style: italic; color: #475569;">
            "{{ share.message }}"
        </div>
        {% endif %}

        <div style="text-align: center;">
            <a href="{{ collection_url }}"
               style="display: inline-block; background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 16px;">
                View Collection
            </a>
        </div>
    </div>

    <div style="background: #f8fafc; padding: 16px; border-radius: 0 0 12px 12px; border: 1px solid #e5e7eb; border-top: none; text-align: center;">
        <p style="margin: 0; color: #94a3b8; font-size: 12px;">HomeFinder Social</p>
    </div>
</div>
