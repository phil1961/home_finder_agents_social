{% extends "base.html" %}
{% block title %}Create Collection — HomeFinder{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h4 class="mb-4"><i class="bi bi-collection me-2 text-primary"></i>Create a New Collection</h4>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" action="{{ site_url('social.collection_create') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Collection Title</label>
                        <input type="text" name="title" id="title" class="form-control"
                               placeholder="e.g., Dream Homes in Mt. Pleasant" required maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description <span class="text-muted">(optional)</span></label>
                        <textarea name="description" id="description" class="form-control" rows="3"
                                  placeholder="What's this collection about?"></textarea>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" name="is_public" id="is_public" class="form-check-input">
                            <label for="is_public" class="form-check-label">
                                Make this collection public
                            </label>
                            <div class="form-text">Public collections can be discovered by other users.</div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-lg me-1"></i>Create Collection
                        </button>
                        <a href="{{ site_url('social.collections_list') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
