# DEPLOYMENT LOCATION: /etc/nginx/conf.d/homefinder.conf
# Gathered by gather_configs.sh on 2026-03-21 11:57:17

server {
    listen 80;
    listen [::]:80;
    server_name homefindersocial.com www.homefindersocial.com;

    # Strip the old prefix and redirect to the equivalent root path
    location ^~ /home_finder_agents_social {
	rewrite ^/home_finder_agents_social/(.*)$ https://homefindersocial.com/$1 permanent;
    }

    location / {
	proxy_pass http://unix:/home/homefinder/homefinder.sock;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto https;   # hardcode — Cloudflare always sends HTTPS
	proxy_read_timeout 120s;
    } 
}

